<!DOCTYPE html>
<html>

<head>
    <title>Chat Nhóm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 p-8">
    <div class="max-w-lg mx-auto bg-white shadow-lg rounded-lg p-6">
        <h2 class="text-2xl font-bold mb-4 text-blue-600">Phòng Chat Công Cộng</h2>

        <!-- JOIN -->
        <div id="setup" class="mb-4">
            <input id="name" type="text" placeholder="Tên của bạn..." class="border p-2 rounded w-full mb-2">
            <button onclick="join()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
                Vào Chat
            </button>
        </div>

        <!-- CHAT BOX -->
        <div id="chat-box" class="h-64 border overflow-y-auto p-4 mb-4 bg-gray-50 rounded">
        </div>

        <!-- INPUT -->
        <div class="flex">
            <input id="msg" type="text" class="flex-1 border p-2 rounded-l" placeholder="Nhắn gì đó..."
                onkeydown="if(event.key==='Enter') send()">
            <button onclick="send()" class="bg-green-500 text-white px-4 rounded-r hover:bg-green-600">
                Gửi
            </button>
        </div>
    </div>

    <script>
        let ws;
        function join() {
            const name = document.getElementById("name").value.trim();
            if (!name) return alert("Nhập tên!");
            if (/\s/.test(name)) {
                return alert("Tên không được chứa dấu cách! Vui lòng dùng dấu gạch dưới (vd: Nguyen_Van_A)");
            }
            const protocol = location.protocol === "https:" ? "wss" : "ws";
            ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat/${name}`);

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const box = document.getElementById("chat-box");
                let html = "";

                if (data.type === "private") {
                    // Giao diện tin nhắn riêng
                    const isMe = data.from === name; // 'name' là biến lưu nickname của chính mình
                    html = `
            <div class="mb-1 p-1 bg-purple-50 rounded border border-purple-100 italic">
                <span class="text-purple-600 font-bold">
                    ${isMe ? `[Gửi tới ${data.to}]` : `[Tin riêng từ ${data.from}]`}:
                </span> 
                <span class="text-purple-700">${data.message}</span>
            </div>
        `;
                } else {
                    // Giao diện tin nhắn công khai/hệ thống (giữ nguyên logic cũ)
                    const isSys = data.type === "sys";
                    const userClass = isSys ? "text-gray-500" : "text-blue-600 font-bold";
                    html = `
            <div class="mb-1">
                <span class="${userClass}">${data.user || data.from}:</span> ${data.message}
            </div>
        `;
                }

                box.innerHTML += html;
                box.scrollTop = box.scrollHeight;
            };

            ws.onclose = (event) => {
                const box = document.getElementById("chat-box");

                // Kiểm tra mã đóng (Close Code) từ Server gửi về
                if (event.code === 4003) {
                    // Hiển thị thông báo bị Ban ngay trong khung chat
                    box.innerHTML += `
                        <div class="p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-100 border border-red-200 mt-2" role="alert">
                            <span class="font-bold">Thông báo:</span> Tài khoản/IP của bạn đã bị quản trị viên chặn khỏi hệ thống.
                        </div>
                    `;
                    // Thay đổi trạng thái nhập liệu
                    document.getElementById("setup").innerHTML = `
                        <p class="text-red-600 font-bold italic">
                            TRẠNG THÁI: ĐÃ BỊ CẤM TRUY CẬP
                        </p>
                    `;
                    document.getElementById("msg").disabled = true;
                    document.getElementById("msg").placeholder = "Bạn không thể gửi tin nhắn...";
                } else {
                    alert("Mất kết nối server hoặc phòng chat đã đóng.");
                }
            };

            document.getElementById("setup").innerHTML = `
                <p class="text-green-500">
                    Đang chat với tên: <b>${name}</b>
                </p>
            `;
        }

        function send() {
            const input = document.getElementById("msg");
            if (ws && ws.readyState === WebSocket.OPEN && input.value.trim()) {
                ws.send(input.value);
                input.value = "";
            }
        }
    </script>
</body>

</html>
